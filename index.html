<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Domain Expansion: Infinite Chicken</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: 'Segoe UI', sans-serif;
        user-select: none;
      }

      /* UI OVERLAY */
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        z-index: 10;
      }

      #hud-top {
        padding: 20px;
        display: flex;
        justify-content: space-between;
      }

      #p-health-label {
        color: #00d2ff;
        font-weight: bold;
        text-shadow: 0 0 10px #00d2ff;
        letter-spacing: 2px;
      }

      #p-health-box {
        width: 350px;
        height: 15px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #00d2ff;
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
      }

      #p-health-fill {
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #00d2ff, #bc13fe);
        transition: width 0.1s;
      }

      #hud-right {
        text-align: right;
        color: white;
      }

      #ammo-txt {
        font-size: 40px;
        font-weight: 900;
        color: #bc13fe;
        text-shadow: 0 0 15px #bc13fe;
      }

      #menu {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #1a0033 0%, #000 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        z-index: 100;
      }

      #menu h1 {
        font-size: 70px;
        color: #bc13fe;
        text-shadow: 0 0 30px #bc13fe, 0 0 60px #00d2ff;
        margin: 0;
      }

      button {
        margin-top: 40px;
        padding: 20px 80px;
        font-size: 24px;
        background: rgba(188, 19, 254, 0.2);
        color: #00d2ff;
        border: 2px solid #00d2ff;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 0 20px #00d2ff;
      }

      button:hover {
        background: #00d2ff;
        color: #000;
      }

      #damage-flash {
        position: absolute;
        width: 100%;
        height: 100%;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 50;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="damage-flash"></div>
    <div id="ui-layer">
      <div id="hud-top">
        <div>
          <div id="p-health-label">CURSED ENERGY</div>
          <div id="p-health-box"><div id="p-health-fill"></div></div>
        </div>
        <div id="hud-right">
          <div id="ammo-txt">30 / 30</div>
          <div id="score-txt">EXORCISED: 0</div>
        </div>
      </div>
    </div>

    <div id="menu">
      <h1>UNLIMITED VOID</h1>
      <button id="start-btn">EXPAND DOMAIN</button>
    </div>

    <script>
      let camera, scene, renderer, raycaster, yawObj, pitchObj;
      let moveF = false, moveB = false, moveL = false, moveR = false, canJump = false;
      let velocityY = 0, prevTime = performance.now();
      let projectiles = [], enemies = [], stars = [];
      let score = 0, health = 100, ammo = 30, isLocked = false, lastSpawn = 0;

      const SOUNDS = {
        expansion: "https://www.myinstants.com/media/sounds/ryoiki-tenkai.mp3",
        purple: "https://www.myinstants.com/media/sounds/hollow-purple.mp3",
        hit: "https://www.myinstants.com/media/sounds/punch-anime.mp3"
      };

      init();
      animate();

      function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050010);
        scene.fog = new THREE.Fog(0x0a001a, 20, 100);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        pitchObj = new THREE.Object3D();
        pitchObj.add(camera);
        yawObj = new THREE.Object3D();
        yawObj.position.y = 2;
        yawObj.add(pitchObj);
        scene.add(yawObj);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        raycaster = new THREE.Raycaster();

        // Lighting
        scene.add(new THREE.AmbientLight(0x4b0082, 0.6));
        const pLight = new THREE.PointLight(0x00d2ff, 2, 50);
        pLight.position.set(0, 10, 0);
        scene.add(pLight);

        // Map Visuals
        createInfiniteVoidMap();

        // START
        document.getElementById('start-btn').onclick = () => {
          document.body.requestPointerLock();
          
          // FORCED AUDIO START
          const vox = new Audio(SOUNDS.expansion);
          vox.volume = 1.0;
          vox.play().catch(e => console.log("Audio Blocked", e));

          const flash = document.getElementById('damage-flash');
          flash.style.opacity = "1";
          setTimeout(() => flash.style.opacity = "0", 1000);
        };

        document.addEventListener('pointerlockchange', () => {
          isLocked = document.pointerLockElement === document.body;
          document.getElementById('menu').style.display = isLocked ? 'none' : 'flex';
        });

        window.addEventListener('resize', onResize);
        document.addEventListener('keydown', (e) => handleKey(e.code, true));
        document.addEventListener('keyup', (e) => handleKey(e.code, false));
        document.addEventListener('mousedown', onShoot);
        document.addEventListener('mousemove', onMouseMove);
      }

      function createInfiniteVoidMap() {
        // Reflective Floor
        const grid = new THREE.GridHelper(200, 40, 0xbc13fe, 0x4b0082);
        grid.position.y = 0.05;
        scene.add(grid);

        const floorGeo = new THREE.PlaneGeometry(1000, 1000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x020005, metalness: 0.9, roughness: 0.1 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Colorful Star Particles
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<2000; i++) {
          starCoords.push((Math.random()-0.5)*200, Math.random()*100, (Math.random()-0.5)*200);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true });
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);
      }

      function createChicken() {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0x111111, emissive: 0xbc13fe, emissiveIntensity: 0.8 });
        
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1.2), mat);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), mat);
        head.position.set(0, 0.8, 0.5);
        
        const blindfold = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.25, 0.75), new THREE.MeshBasicMaterial({color: 0x000000}));
        blindfold.position.set(0, 0.85, 0.5);
        
        group.add(body, head, blindfold);
        
        const dist = 40;
        const ang = Math.random() * Math.PI * 2;
        group.position.set(yawObj.position.x + Math.cos(ang)*dist, 0, yawObj.position.z + Math.sin(ang)*dist);
        
        group.userData = { hp: 3, speed: 10 };
        scene.add(group);
        enemies.push(group);
      }

      function onShoot() {
        if (!isLocked || ammo <= 0) return;
        ammo--;
        new Audio(SOUNDS.purple).play();
        
        const egg = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({ color: 0xbc13fe }));
        egg.position.copy(yawObj.position);
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));
        egg.userData = { vel: dir.multiplyScalar(80) };
        scene.add(egg);
        projectiles.push(egg);
        document.getElementById('ammo-txt').innerText = `${ammo} / 30`;
      }

      function handleKey(code, down) {
        if(code==='KeyW') moveF=down; if(code==='KeyS') moveB=down;
        if(code==='KeyA') moveL=down; if(code==='KeyD') moveR=down;
        if(code==='Space' && down && canJump) { velocityY=12; canJump=false; }
      }

      function onMouseMove(e) {
        if (!isLocked) return;
        yawObj.rotation.y -= e.movementX * 0.002;
        pitchObj.rotation.x -= e.movementY * 0.002;
        pitchObj.rotation.x = Math.max(-1.5, Math.min(1.5, pitchObj.rotation.x));
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {
        requestAnimationFrame(animate);
        if (!isLocked) return;

        const time = performance.now();
        const delta = (time - prevTime) / 1000;
        prevTime = time;

        // Player movement
        velocityY -= 30 * delta;
        yawObj.position.y += velocityY * delta;
        if (yawObj.position.y < 2) { velocityY = 0; yawObj.position.y = 2; canJump = true; }
        const speed = 15 * delta;
        if (moveF) yawObj.translateZ(-speed); if (moveB) yawObj.translateZ(speed);
        if (moveL) yawObj.translateX(-speed); if (moveR) yawObj.translateX(speed);

        // Spawn
        if (time - lastSpawn > 1500) { createChicken(); lastSpawn = time; }

        // Projectiles
        projectiles.forEach((p, i) => {
          p.position.add(p.userData.vel.clone().multiplyScalar(delta));
          enemies.forEach((e, ei) => {
            if (p.position.distanceTo(e.position) < 2) {
              e.userData.hp--;
              scene.remove(p); projectiles.splice(i, 1);
              if (e.userData.hp <= 0) { score += 10; scene.remove(e); enemies.splice(ei, 1); }
            }
          });
        });

        // Enemies & TAKE DAMAGE LOGIC
        enemies.forEach(e => {
          e.lookAt(yawObj.position.x, 0, yawObj.position.z);
          e.translateZ(e.userData.speed * delta);
          
          // If within range, take significant damage
          if (e.position.distanceTo(yawObj.position) < 3.5) {
            health -= 40 * delta; // You will die in ~2.5 seconds if standing still
            document.getElementById('p-health-fill').style.width = health + '%';
            
            // Visual feedback
            const flash = document.getElementById('damage-flash');
            flash.style.background = "red";
            flash.style.opacity = "0.2";
            setTimeout(() => flash.style.opacity = "0", 50);

            if(Math.random() > 0.98) new Audio(SOUNDS.hit).play();
          }
        });

        if (health <= 0) {
          alert("CURSED ENERGY DEPLETED");
          location.reload();
        }

        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
