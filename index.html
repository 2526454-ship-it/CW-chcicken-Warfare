<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Monarch: Final System</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,900&display=swap');
      body { margin: 0; overflow: hidden; background: #000; font-family: 'Kanit', sans-serif; }
      
      #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; padding: 30px; }
      
      /* SYSTEM HEALTH BAR */
      .status-wrap { width: 400px; transform: skew(-15deg); }
      .bar-label { color: #0f0; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 4px; text-shadow: 0 0 5px #0f0; }
      .hp-bg { width: 100%; height: 18px; background: rgba(0, 40, 0, 0.6); border: 2px solid #0f0; position: relative; overflow: hidden; }
      #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #0f0, #004400); transition: 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
      #hp-ghost { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; transition: 0.2s; }

      #menu { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #0f0; }
      button { padding: 15px 60px; font-size: 1.8rem; background: #0f0; border: none; cursor: pointer; transform: skew(-10deg); color: #000; font-family: 'Kanit'; }
      
      #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #0f0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="crosshair"></div>
    <div id="hud">
      <div class="status-wrap">
        <div class="bar-label">PLAYER: SUNG JIN-WOO</div>
        <div class="hp-bg">
            <div id="hp-ghost"></div>
            <div id="hp-bar"></div>
        </div>
      </div>
    </div>

    <div id="menu">
      <h1 style="font-size: 4rem; letter-spacing: -2px;">SYSTEM INITIALIZED</h1>
      <button id="start-btn">ARISE</button>
    </div>

    <script>
      let scene, camera, renderer, yaw, pitch, viewmodel;
      let moveState = { w:0, a:0, s:0, d:0, shift:0, space:0, ctrl:0 };
      let velocity = new THREE.Vector3(), canJump = true, health = 100;
      let isLocked = false, enemies = [];
      const clock = new THREE.Clock();

      init();
      animate();

      function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000500, 10, 450);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        pitch = new THREE.Object3D(); pitch.add(camera);
        yaw = new THREE.Object3D(); yaw.position.set(0, 5, 0); yaw.add(pitch);
        scene.add(yaw);

        // Viewmodel
        viewmodel = new THREE.Group();
        camera.add(viewmodel);
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.02, 1.2), new THREE.MeshBasicMaterial({ color: 0x00ff44 }));
        blade.position.set(0.6, -0.4, -1.2);
        viewmodel.add(blade);

        // Ground
        scene.add(new THREE.GridHelper(2000, 100, 0x003300, 0x001100));
        scene.add(new THREE.AmbientLight(0x00ff00, 0.1));

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        document.getElementById('start-btn').onclick = () => document.body.requestPointerLock();
        document.addEventListener('pointerlockchange', () => {
          isLocked = document.pointerLockElement === document.body;
          document.getElementById('menu').style.display = isLocked ? 'none' : 'flex';
        });

        // INPUT LISTENERS
        const handleKeys = (e, val) => {
          const key = e.key.toLowerCase();
          if (key === 'shift') moveState.shift = val;
          if (key === ' ') moveState.space = val;
          if (e.code === 'ControlLeft') moveState.ctrl = val;
          if (moveState.hasOwnProperty(key)) moveState[key] = val;
        };
        window.addEventListener('keydown', (e) => handleKeys(e, 1));
        window.addEventListener('keyup', (e) => handleKeys(e, 0));
        window.addEventListener('mousedown', () => { if(isLocked) attack(); });
        
        document.addEventListener('mousemove', (e) => {
          if(!isLocked) return;
          yaw.rotation.y -= e.movementX * 0.002;
          pitch.rotation.x -= e.movementY * 0.002;
          pitch.rotation.x = Math.max(-1.4, Math.min(1.4, pitch.rotation.x));
        });
      }

      function attack() {
        viewmodel.position.z = -0.5;
        setTimeout(() => viewmodel.position.z = 0, 100);
        enemies.forEach((e, i) => {
          if(yaw.position.distanceTo(e.position) < 22) {
            scene.remove(e);
            enemies.splice(i, 1);
          }
        });
      }

      function takeDamage(amt) {
        health -= amt;
        const bar = document.getElementById('hp-bar');
        const ghost = document.getElementById('hp-ghost');
        bar.style.width = health + "%";
        ghost.style.opacity = 1;
        setTimeout(() => ghost.style.opacity = 0, 100);
        if(health <= 0) location.reload();
      }

      function spawnEnemy() {
        if(enemies.length > 15) return;
        const e = new THREE.Mesh(new THREE.BoxGeometry(2, 6, 2), new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true }));
        const angle = Math.random() * Math.PI * 2;
        e.position.set(Math.cos(angle)*150 + yaw.position.x, 3, Math.sin(angle)*150 + yaw.position.z);
        scene.add(e); enemies.push(e);
      }

      function animate() {
        requestAnimationFrame(animate);
        if(!isLocked) return;

        const dt = clock.getDelta();
        const t = clock.getElapsedTime();

        // --- PHYSICS & MOVEMENT ---
        let speed = moveState.shift ? 75 : 45;
        if (moveState.ctrl) speed *= 0.5;

        // XZ Movement
        let input = new THREE.Vector3((moveState.d - moveState.a), 0, (moveState.s - moveState.w)).normalize();
        let moveDir = input.applyQuaternion(yaw.quaternion);
        velocity.x = THREE.MathUtils.lerp(velocity.x, moveDir.x * speed, 0.15);
        velocity.z = THREE.MathUtils.lerp(velocity.z, moveDir.z * speed, 0.15);
        
        // Jump & Gravity
        if (moveState.space && canJump) {
            velocity.y = 35;
            canJump = false;
        }
        velocity.y -= 90 * dt; // Gravity
        
        yaw.position.add(velocity.clone().multiplyScalar(dt));

        // Floor Collision
        if (yaw.position.y < 5) {
            velocity.y = 0;
            yaw.position.y = 5;
            canJump = true;
        }

        // Crouch POV
        const targetHeight = moveState.ctrl ? -1.5 : 0;
        pitch.position.y = THREE.MathUtils.lerp(pitch.position.y, targetHeight, 0.2);

        // Sprint FOV Effect
        const targetFOV = moveState.shift ? 85 : 75;
        camera.fov = THREE.MathUtils.lerp(camera.fov, targetFOV, 0.1);
        camera.updateProjectionMatrix();

        // Enemies
        if(Math.random() > 0.98) spawnEnemy();
        enemies.forEach(e => {
          e.lookAt(yaw.position.x, 3, yaw.position.z);
          e.translateZ(18 * dt);
          if(e.position.distanceTo(yaw.position) < 7) takeDamage(0.3);
        });

        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
